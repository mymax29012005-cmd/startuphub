<!DOCTYPE html>
<html lang="ru" class="scroll-smooth">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Маркетплейс • StartupHub</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap');
    
    body { 
      font-family: 'Inter', sans-serif; 
      background: linear-gradient(135deg, 
        #06060E 0%, 
        #0D0A1C 20%, 
        #16112B 40%, 
        #1F1638 60%, 
        #16112B 80%, 
        #0D0A1C 100%);
      background-size: 400% 400%;
      animation: combinedFlow 80s ease infinite;
      position: relative;
      overflow-x: hidden;
    }

    /* Комбинированная анимация: горизонтальный + вертикальный перелив */
    @keyframes combinedFlow {
      0%   { background-position: 0% 0%; }
      25%  { background-position: 100% 30%; }
      50%  { background-position: 70% 80%; }
      75%  { background-position: 20% 40%; }
      100% { background-position: 0% 0%; }
    }

    /* Дополнительный слой с мягкими неоновыми волнами */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: 
        linear-gradient(90deg, transparent, rgba(124, 58, 237, 0.14), transparent),
        linear-gradient(180deg, transparent, rgba(225, 29, 72, 0.11), transparent);
      background-size: 300% 300%, 100% 500%;
      animation: neonLayer 55s linear infinite;
      pointer-events: none;
      z-index: -1;
      opacity: 0.75;
    }

    @keyframes neonLayer {
      0%   { background-position: 0% 50%, 0% 0%; }
      50%  { background-position: 100% 50%, 0% -200%; }
      100% { background-position: 0% 50%, 0% 0%; }
    }

    .heading { font-family: 'Space Grotesk', sans-serif; }

    /* Siri-style логотип */
    .logo-dot {
      position: relative; width: 44px; height: 44px;
    }
    .logo-dot::before, .logo-dot::after {
      content: ''; position: absolute; border-radius: 9999px;
      top: 50%; left: 50%; transform: translate(-50%, -50%);
    }
    .logo-dot::before {
      width: 52px; height: 52px;
      background: radial-gradient(circle, rgba(124,58,237,0.55) 10%, rgba(225,29,72,0.35) 40%, rgba(0,245,212,0.18) 70%, transparent);
      animation: siriGlow 6s ease-in-out infinite;
      filter: blur(8px);
    }
    .logo-dot::after {
      width: 42px; height: 42px;
      background: linear-gradient(135deg, #7C3AED, #C026D3, #E11D48, #00F5D4, #A855F7);
      background-size: 300% 300%;
      animation: colorFlow 7.5s ease infinite, siriBreath 4s ease-in-out infinite;
      box-shadow: 0 0 20px rgba(124,58,237,0.75), inset 0 0 16px rgba(255,255,255,0.2);
    }
    @keyframes colorFlow { 0%{background-position:0% 50%} 25%{background-position:100% 30%} 50%{background-position:80% 100%} 75%{background-position:20% 70%} 100%{background-position:0% 50%} }
    @keyframes siriBreath { 0%,100%{transform:translate(-50%,-50%) scale(1)} 50%{transform:translate(-50%,-50%) scale(1.11)} }
    @keyframes siriGlow { 0%,100%{opacity:0.68; transform:translate(-50%,-50%) scale(1)} 50%{opacity:0.92; transform:translate(-50%,-50%) scale(1.13)} }

    .nav-glass { 
      background: rgba(10, 10, 15, 0.95); 
      backdrop-filter: blur(16px); 
    }
    .card-hover { 
      transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1); 
      background: #12121A;
    }
    .card-hover:hover { 
      transform: translateY(-10px) scale(1.03); 
      box-shadow: 0 30px 60px -15px rgb(124 58 237 / 0.45);
    }
    .tab-active {
      border-bottom: 3px solid #7C3AED;
      color: #fff;
      font-weight: 600;
    }
  </style>
</head>
<body class="text-white">

  <!-- Navbar -->
  <nav class="nav-glass fixed top-0 left-0 right-0 z-50 border-b border-white/10">
    <div class="max-w-7xl mx-auto px-6 py-5 flex items-center justify-between">
      <div class="flex items-center gap-3">
        <div class="logo-dot"></div>
        <span class="heading text-2xl font-semibold tracking-tight">StartupHub</span>
      </div>
      
      <div class="hidden md:flex items-center gap-8 text-sm font-medium">
        <a href="index.html" class="hover:text-violet-400 transition">Главная</a>
        <a href="#" class="text-violet-400 font-semibold">Маркетплейс</a>
        <a href="#" class="hover:text-violet-400 transition">Аукционы</a>
        <a href="#" class="hover:text-violet-400 transition">Идеи</a>
      </div>
      
      <div class="flex items-center gap-4">
        <button onclick="alert('Поиск...')" class="px-5 py-3 text-sm font-medium rounded-3xl border border-white/30 hover:bg-white/10 flex items-center gap-2">
          <i class="fa-solid fa-magnifying-glass"></i> Поиск
        </button>
        <button onclick="alert('Разместить проект')" 
                class="px-6 py-3 text-sm font-semibold rounded-3xl bg-gradient-to-r from-violet-600 to-rose-500 hover:brightness-110 transition">
          + Разместить
        </button>
      </div>
    </div>
  </nav>

  <div class="pt-24 max-w-7xl mx-auto px-6 pb-16">
    
    <div class="py-12">
      <h1 class="heading text-5xl md:text-6xl font-bold tracking-tighter mb-3">
        Маркетплейс
      </h1>
      <p class="text-xl text-gray-400 max-w-2xl">
        Более 380 стартапов, идей и аукционов в одном месте
      </p>
      
      <div class="mt-10 relative max-w-2xl">
        <div class="bg-[#12121A] border border-white/10 rounded-3xl px-6 py-5 flex items-center gap-4">
          <i class="fa-solid fa-magnifying-glass text-2xl text-violet-400"></i>
          <input id="searchInput" type="text" placeholder="Поиск по названию, отрасли или ключевому слову..." 
                 class="flex-1 bg-transparent outline-none text-lg placeholder-gray-500" onkeyup="filterCards()">
          <button onclick="filterCards()" class="px-10 py-4 bg-violet-600 rounded-3xl font-medium hover:bg-violet-500 transition">
            Найти
          </button>
        </div>
      </div>
    </div>

    <!-- Табы -->
    <div class="flex items-center gap-8 border-b border-white/10 pb-4 mt-8 overflow-x-auto" id="tabs">
      <button onclick="switchTab(0)" class="tab-active px-6 py-3 text-lg" id="tab-0">Стартапы</button>
      <button onclick="switchTab(1)" class="px-6 py-3 text-lg text-gray-400 hover:text-white" id="tab-1">Идеи</button>
      <button onclick="switchTab(2)" class="px-6 py-3 text-lg text-gray-400 hover:text-white" id="tab-2">Аукционы</button>
    </div>

    <div class="flex gap-8 pt-10">
      <div class="flex-1" id="cardsContainer"></div>
    </div>
  </div>

  <script>
    const data = {
      0: [
        {title:"AI-платформа для автоматизации продаж", desc:"Сокращает цикл продаж на 68%", stage:"Seed", amount:"12 млн ₽", location:"Москва"},
        {title:"Платформа управления складами IoT", desc:"Снижает потери на 42%", stage:"Series A", amount:"45 млн ₽", location:"Санкт-Петербург"},
        {title:"Мобильное приложение EcoTrack", desc:"Gamification сбора мусора", stage:"Pre-Seed", amount:"4.8 млн ₽", location:"Казань"}
      ],
      1: [{title:"Умный холодильник с ИИ-рецептами", desc:"Идея на стадии концепции", stage:"Идея", amount:"800 тыс ₽", location:"Онлайн"}],
      2: [{title:"25% доли в SaaS для ритейла", desc:"Текущая ставка 4.8 млн ₽", stage:"Аукцион", amount:"8 млн ₽", time:"2 дня 14ч"}]
    };

    function createCard(item) {
      return `
        <div class="card-hover border border-white/10 rounded-3xl overflow-hidden p-7 mb-8">
          <div class="flex justify-between items-start">
            <h3 class="font-semibold text-xl">${item.title}</h3>
            ${item.time ? 
              `<span class="text-xs bg-rose-500/20 text-rose-400 px-4 py-1 rounded-2xl">${item.time}</span>` : 
              `<span class="text-xs bg-emerald-500/20 text-emerald-400 px-4 py-1 rounded-2xl">${item.stage}</span>`}
          </div>
          <p class="text-gray-400 mt-4 mb-6">${item.desc}</p>
          <div class="flex justify-between text-sm">
            <div><span class="text-gray-400">Нужно:</span> <span class="font-medium">${item.amount}</span></div>
            <div class="text-violet-300">${item.location}</div>
          </div>
        </div>`;
    }

    function renderCards(tabIndex) {
      const container = document.getElementById('cardsContainer');
      container.innerHTML = `<div class="grid md:grid-cols-2 xl:grid-cols-3 gap-6">`;
      data[tabIndex].forEach(item => container.innerHTML += createCard(item));
      container.innerHTML += `</div>`;
    }

    function switchTab(tabIndex) {
      document.querySelectorAll('#tabs button').forEach(b => b.classList.remove('tab-active'));
      document.getElementById('tab-' + tabIndex).classList.add('tab-active');
      renderCards(tabIndex);
    }

    function filterCards() {
      const query = document.getElementById('searchInput').value.toLowerCase();
      document.querySelectorAll('.card-hover').forEach(card => {
        card.style.display = card.textContent.toLowerCase().includes(query) ? 'block' : 'none';
      });
    }

    window.onload = () => renderCards(0);
  </script>

  <footer class="bg-black/60 py-12 text-center text-gray-500 text-sm border-t border-white/10 mt-20">
    <p>© 2026 StartupHub.ru — Маркетплейс с медленным горизонтально-вертикальным переливом</p>
  </footer>
</body>
</html>
