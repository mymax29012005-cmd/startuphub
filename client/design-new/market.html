<!DOCTYPE html>
<html lang="ru" class="scroll-smooth">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Маркетплейс • StartupHub</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap');
    
    body { font-family: 'Inter', sans-serif; }
    .heading { font-family: 'Space Grotesk', sans-serif; }

    .logo-dot {
      position: relative; width: 44px; height: 44px;
    }
    .logo-dot::before, .logo-dot::after {
      content: ''; position: absolute; border-radius: 9999px;
      top: 50%; left: 50%; transform: translate(-50%, -50%);
    }
    .logo-dot::before {
      width: 52px; height: 52px;
      background: radial-gradient(circle, rgba(124,58,237,0.6) 10%, rgba(225,29,72,0.4) 40%, rgba(0,245,212,0.3) 70%, transparent);
      animation: siriGlow 6s ease-in-out infinite;
      filter: blur(8px);
    }
    .logo-dot::after {
      width: 42px; height: 42px;
      background: linear-gradient(135deg, #7C3AED, #C026D3, #E11D48, #00F5D4, #22D3EE, #A855F7);
      background-size: 300% 300%;
      animation: colorFlow 7.5s ease infinite, siriBreath 4s ease-in-out infinite;
      box-shadow: 0 0 25px rgba(124,58,237,0.9), inset 0 0 20px rgba(255,255,255,0.4);
    }
    @keyframes colorFlow { 0%{background-position:0% 50%} 25%{background-position:100% 30%} 50%{background-position:80% 100%} 75%{background-position:20% 70%} 100%{background-position:0% 50%} }
    @keyframes siriBreath { 0%,100%{transform:translate(-50%,-50%) scale(1)} 50%{transform:translate(-50%,-50%) scale(1.12)} }
    @keyframes siriGlow { 0%,100%{opacity:0.75; transform:translate(-50%,-50%) scale(1)} 50%{opacity:1; transform:translate(-50%,-50%) scale(1.15)} }

    .nav-glass { background: rgba(10, 10, 15, 0.95); backdrop-filter: blur(16px); }
    .create-btn {
      transition: all 0.3s ease;
    }
    .create-btn:hover {
      transform: translateY(-2px);
    }
  </style>
</head>
<body class="bg-[#0A0A0F] text-white">

  <!-- Navbar -->
  <nav class="nav-glass fixed top-0 left-0 right-0 z-50 border-b border-white/10">
    <div class="max-w-7xl mx-auto px-6 py-5 flex items-center justify-between">
      <div class="flex items-center gap-3">
        <div class="logo-dot"></div>
        <span class="heading text-2xl font-semibold tracking-tight">StartupHub</span>
      </div>
      
      <div class="hidden md:flex items-center gap-8 text-sm font-medium">
        <a href="index.html" class="hover:text-violet-400">Главная</a>
        <a href="#" class="text-violet-400 font-semibold">Маркетплейс</a>
        <a href="#" class="hover:text-violet-400">Аукционы</a>
        <a href="#" class="hover:text-violet-400">Идеи</a>
      </div>

      <!-- Лаконичная кнопка в хедере -->
      <button onclick="showCreateOptions()" 
              class="create-btn px-7 py-3 bg-white/10 hover:bg-white/20 border border-white/30 rounded-2xl font-medium flex items-center gap-2 transition">
        <i class="fa-solid fa-plus text-lg"></i>
        <span>Разместить</span>
      </button>
    </div>
  </nav>

  <div class="pt-24 max-w-7xl mx-auto px-6">

    <!-- Лаконичный блок создания (небольшой и стильный) -->
    <div class="bg-[#12121A] border border-white/10 rounded-3xl p-8 mb-12 flex flex-col md:flex-row items-center justify-between gap-6">
      <div>
        <h2 class="text-2xl font-semibold">Хотите что-то разместить?</h2>
        <p class="text-gray-400 mt-1">Выберите тип контента, который хотите опубликовать</p>
      </div>
      
      <div class="flex flex-wrap gap-3">
        <button onclick="createItem('startup')" 
                class="px-6 py-3 bg-violet-600 hover:bg-violet-700 rounded-2xl font-medium transition flex items-center gap-2">
          <i class="fa-solid fa-rocket"></i>
          Стартап
        </button>
        
        <button onclick="createItem('idea')" 
                class="px-6 py-3 bg-white/10 hover:bg-white/20 border border-white/30 rounded-2xl font-medium transition flex items-center gap-2">
          <i class="fa-solid fa-lightbulb"></i>
          Идея
        </button>
        
        <button onclick="createItem('auction')" 
                class="px-6 py-3 bg-white/10 hover:bg-white/20 border border-white/30 rounded-2xl font-medium transition flex items-center gap-2">
          <i class="fa-solid fa-gavel"></i>
          Аукцион
        </button>
        
        <button onclick="createItem('investor')" 
                class="px-6 py-3 bg-white/10 hover:bg-white/20 border border-white/30 rounded-2xl font-medium transition flex items-center gap-2">
          <i class="fa-solid fa-hand-holding-dollar"></i>
          Инвестор
        </button>
      </div>
    </div>

    <!-- Здесь будет твой текущий контент маркетплейса (табы, фильтры, карточки) -->
    <div class="text-center py-16 text-gray-500 border border-dashed border-white/20 rounded-3xl">
      ← Здесь остаётся ваш текущий контент страницы маркетплейса (табы, фильтры и карточки проектов)
    </div>

  </div>

  <script>
    function showCreateOptions() {
      alert("Открывается быстрое меню «Разместить» (демо)\n\nВ реальном проекте здесь можно сделать красивое выпадающее меню или модальное окно.");
    }

    function createItem(type) {
      const messages = {
        startup: "Переход на форму создания Стартапа",
        idea: "Переход на форму создания Идеи",
        auction: "Переход на создание Аукциона",
        investor: "Переход на создание профиля Инвестора"
      };
      alert(messages[type] + " (демо)");
    }
  </script>
</body>
</html>
